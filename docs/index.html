<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiCSAR — Deformación InSAR Chile</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <style>
        /* ===== Design tokens ===== */
        :root {
            /* Superficies (azul-oscuro coherente, familia GitHub dark) */
            --bg:           #0a0e17;
            --surface:      #11161f;
            --surface-2:    #1a2130;   /* cabeceras de tarjeta / hover */
            --surface-3:    #232c3d;   /* fila seleccionada */
            --border:       #283040;
            --border-soft:  #1d242f;

            /* Texto (contraste AA: muted >= 4.5:1 sobre --surface) */
            --text:         #eef2f8;
            --text-soft:    #c4ccd8;
            --text-muted:   #9aa6b6;   /* ~5:1 sobre #11161f */
            --text-faint:   #6b7585;

            /* Acentos */
            --accent:       #6ea8ff;
            --accent-2:     #a78bfa;   /* púrpura SAR */
            --green:        #238636;
            --green-soft:   #2ea043;

            /* Semáforo */
            --ok:           #3fb950;
            --warn:         #e3b341;
            --alert:        #ff6b63;
            --none:         #5a6472;

            /* Tintes de badge (fondo translúcido) */
            --ok-bg:        rgba(63,185,80,0.15);
            --warn-bg:      rgba(227,179,65,0.15);
            --alert-bg:     rgba(255,107,99,0.15);

            /* Espaciado (escala 4/8/12/16/20/24) */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;

            /* Radios y sombras */
            --radius:    10px;
            --radius-sm: 6px;
            --radius-pill: 999px;
            --shadow: 0 1px 2px rgba(0,0,0,0.30), 0 4px 12px rgba(0,0,0,0.22);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.28);

            --trans: 140ms ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text-soft);
            min-height: 100vh; line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Scrollbars (tema oscuro) ===== */
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-pill); border: 2px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: #36415a; }

        /* ===== Accesibilidad por teclado ===== */
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--radius-sm); }

        /* ===== Header ===== */
        .header {
            background: linear-gradient(135deg, #161c2b 0%, #0c111b 100%);
            border-bottom: 1px solid var(--border);
            padding: var(--space-3) var(--space-5);
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: var(--space-3);
        }
        .header-left { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }
        .header h1 {
            font-size: 1.05rem; font-weight: 700; color: var(--text);
            letter-spacing: 0.2px; display: flex; align-items: center; gap: var(--space-2);
        }
        .header h1::before {
            content: ""; width: 9px; height: 9px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 8px var(--accent);
        }
        .header-right { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }
        .badge {
            padding: 3px 10px; border-radius: var(--radius-pill);
            font-size: 0.68rem; font-weight: 700; letter-spacing: 0.4px;
        }
        .badge-sar { background: var(--accent-2); color: #fff; }
        .badge-comet { background: var(--green); color: #fff; }
        .header-meta { font-size: 0.78rem; color: var(--text-muted); }

        /* Buscador en header */
        .search-box {
            display: flex; align-items: center; gap: var(--space-2);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-pill); padding: 5px var(--space-3);
            transition: border-color var(--trans), box-shadow var(--trans);
        }
        .search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(110,168,255,0.18); }
        .search-box svg { width: 14px; height: 14px; fill: var(--text-faint); flex-shrink: 0; }
        .search-box input {
            background: transparent; border: none; outline: none;
            color: var(--text); font-size: 0.8rem; width: 150px;
        }
        .search-box input::placeholder { color: var(--text-faint); }

        /* ===== Info bar ===== */
        .info-bar {
            display: flex; gap: var(--space-2) var(--space-4);
            padding: var(--space-2) var(--space-5);
            background: var(--surface); border-bottom: 1px solid var(--border-soft);
            flex-wrap: wrap; font-size: 0.74rem; color: var(--text-muted); align-items: center;
        }
        .info-bar .sep { color: var(--border); }

        /* ===== Layout ===== */
        .main { display: flex; height: calc(100vh - 92px); }
        .lista-panel {
            width: 360px; min-width: 360px; overflow-y: auto;
            border-right: 1px solid var(--border-soft); background: var(--bg);
        }
        .detalle-panel {
            flex: 1; overflow-y: auto; padding: var(--space-5);
            background: var(--bg); max-width: 1100px;
        }

        /* ===== Sidebar: filas de volcán ===== */
        .volcan-row {
            padding: var(--space-2) var(--space-4);
            border-bottom: 1px solid var(--border-soft);
            cursor: pointer; display: flex; align-items: center; gap: var(--space-3);
            border-left: 3px solid transparent;
            transition: background var(--trans), border-color var(--trans);
        }
        .volcan-row:hover { background: var(--surface-2); }
        .volcan-row.selected { background: var(--surface-3); border-left-color: var(--accent-2); }
        .estado-dot {
            width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
        }
        .dot-ok { background: var(--ok); }
        .dot-warn { background: var(--warn); }
        .dot-alert { background: var(--alert); }
        .dot-sin { background: var(--none); }
        .vname { font-size: 0.86rem; font-weight: 600; color: var(--text); line-height: 1.35; }
        .vtracks { font-size: 0.7rem; color: var(--text-muted); margin-top: 1px; }
        .vprob {
            font-size: 0.62rem; padding: 2px 8px; border-radius: var(--radius-pill);
            font-weight: 700; letter-spacing: 0.2px; flex-shrink: 0; white-space: nowrap;
        }
        .vprob-ok { background: var(--ok-bg); color: var(--ok); }
        .vprob-warn { background: var(--warn-bg); color: var(--warn); }
        .vprob-alert { background: var(--alert-bg); color: var(--alert); }
        .zona-hdr {
            padding: var(--space-2) var(--space-4);
            background: rgba(13,17,26,0.92); backdrop-filter: blur(6px);
            font-size: 0.68rem; font-weight: 700; color: var(--accent-2);
            text-transform: uppercase; letter-spacing: 1.2px;
            border-bottom: 1px solid var(--border-soft);
            position: sticky; top: 0; z-index: 2;
        }

        /* ===== Panel de detalle ===== */
        .detalle-placeholder {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: var(--text-faint); font-size: 0.92rem; text-align: center; padding: var(--space-5);
        }
        .detalle-titulo { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: var(--space-1); letter-spacing: -0.2px; }
        .detalle-sub { font-size: 0.82rem; color: var(--text-muted); margin-bottom: var(--space-5); }

        /* ===== Tarjeta base compartida ===== */
        .comet-section, .prob-card, .ifg-card, .info-insar, .ts-section, .sin-datos-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow-sm);
        }
        .card-head {
            padding: var(--space-3) var(--space-4); background: var(--surface-2);
            border-bottom: 1px solid var(--border);
        }

        /* ===== COMET ===== */
        .comet-section { margin-bottom: var(--space-5); overflow: hidden; }
        .comet-header {
            padding: var(--space-3) var(--space-4); background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: var(--space-2);
        }
        .comet-header-left { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
        .comet-title { font-size: 0.86rem; font-weight: 600; color: var(--text); }
        .comet-badge { font-size: 0.62rem; font-weight: 700; padding: 2px 8px; border-radius: var(--radius-pill); background: var(--green); color: #fff; letter-spacing: 0.3px; }
        .comet-stats { font-size: 0.7rem; color: var(--text-muted); }
        .comet-selector { display: flex; align-items: center; gap: var(--space-2); }
        .comet-selector label { font-size: 0.72rem; color: var(--text-muted); }
        .comet-selector select {
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 4px var(--space-2); font-size: 0.75rem;
            cursor: pointer; transition: border-color var(--trans);
        }
        .comet-selector select:hover { border-color: var(--accent); }
        .comet-body { padding: var(--space-3); }
        .comet-body img, .comet-img-container img {
            width: 100%; display: block; background: #000; cursor: zoom-in;
            border-radius: var(--radius-sm); transition: opacity var(--trans);
        }
        .comet-body img:hover { opacity: 0.92; }
        .comet-fecha { font-size: 0.72rem; color: var(--text-muted); margin-top: var(--space-2); text-align: center; }

        /* ===== COMET: interferograma + mapa de probabilidad lado a lado ===== */
        .comet-pair { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
        .comet-pane { display: flex; flex-direction: column; min-width: 0; }
        .comet-pane-label {
            font-size: 0.7rem; font-weight: 600; color: var(--text-soft);
            margin-bottom: var(--space-1); display: flex; align-items: center; gap: var(--space-2);
        }
        .comet-pane-label .comet-ml-tag {
            font-size: 0.58rem; font-weight: 700; letter-spacing: 0.2px;
            padding: 1px 7px; border-radius: var(--radius-pill);
            background: var(--alert-bg); color: var(--alert);
        }
        .comet-pane img {
            width: 100%; display: block; background: #000; cursor: zoom-in;
            border-radius: var(--radius-sm); transition: opacity var(--trans);
        }
        .comet-pane img:hover { opacity: 0.92; }
        .comet-probmap-note {
            font-size: 0.66rem; color: var(--text-muted); margin-top: var(--space-1);
            line-height: 1.5; text-align: center;
        }
        @media (max-width: 700px) { .comet-pair { grid-template-columns: 1fr; } }

        /* ===== Tarjeta de score ML ===== */
        .prob-card { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-4); margin-bottom: var(--space-4); }
        .prob-icon { font-size: 1.5rem; line-height: 1; flex-shrink: 0; }
        .prob-info { flex: 1; min-width: 0; }
        .prob-label { font-size: 0.76rem; color: var(--text-muted); line-height: 1.5; }
        .prob-value { font-size: 1.05rem; font-weight: 700; margin: 2px 0; }
        .prob-value-ok { color: var(--ok); }
        .prob-value-warn { color: var(--warn); }
        .prob-value-alert { color: var(--alert); }

        /* ===== Frames colapsable ===== */
        .frames-section { margin-bottom: var(--space-5); }
        .frames-toggle {
            font-size: 0.8rem; font-weight: 600; color: var(--accent); cursor: pointer;
            padding: var(--space-2) var(--space-3);
            display: inline-flex; align-items: center; gap: var(--space-2);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--surface); transition: background var(--trans), border-color var(--trans);
        }
        .frames-toggle:hover { background: var(--surface-2); border-color: var(--accent); }
        .frames-content { display: none; }
        .frames-content.open { display: block; }
        .ifg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-top: var(--space-3); }
        .ifg-card { overflow: hidden; }
        .ifg-header { padding: var(--space-2) var(--space-3); background: var(--surface-2); border-bottom: 1px solid var(--border); }
        .ifg-label { font-size: 0.8rem; font-weight: 600; color: var(--text); }
        .ifg-sub { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
        .ifg-images { display: grid; grid-template-columns: 1fr 1fr; }
        .img-mini-label { padding: var(--space-1) var(--space-2); font-size: 0.68rem; color: var(--text-muted); background: var(--bg); }
        .ifg-images img { width: 100%; display: block; background: #000; cursor: zoom-in; transition: opacity var(--trans); }
        .ifg-images img:hover { opacity: 0.92; }

        /* ===== Guía InSAR ===== */
        .info-insar { padding: var(--space-4); margin-bottom: var(--space-5); }
        .info-insar h3 { font-size: 0.82rem; font-weight: 700; color: var(--accent-2); margin-bottom: var(--space-3); text-transform: uppercase; letter-spacing: 0.6px; }
        .info-insar p { font-size: 0.78rem; color: var(--text-soft); line-height: 1.7; margin-bottom: var(--space-2); }
        .leyenda { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2) var(--space-4); margin-top: var(--space-3); }
        .ley-item { display: flex; align-items: center; gap: var(--space-2); font-size: 0.75rem; color: var(--text-soft); }
        .ley-swatch { width: 30px; height: 14px; border-radius: var(--radius-sm); flex-shrink: 0; border: 1px solid var(--border-soft); }

        /* ===== Serie temporal ===== */
        .ts-section { padding: var(--space-4); margin-bottom: var(--space-5); }
        .ts-section h3 { font-size: 0.9rem; font-weight: 700; color: var(--accent); margin-bottom: var(--space-3); }
        .ts-stats { display: flex; flex-wrap: wrap; gap: var(--space-2) var(--space-5); font-size: 0.78rem; color: var(--text-soft); margin-bottom: var(--space-3); }
        .ts-stats > span {
            background: var(--surface-2); border: 1px solid var(--border-soft);
            border-radius: var(--radius-sm); padding: var(--space-1) var(--space-3);
        }
        .ts-stats b { color: var(--text); font-weight: 700; }
        .ts-footer { font-size: 0.7rem; color: var(--text-muted); margin-top: var(--space-2); text-align: center; line-height: 1.6; }
        .ts-empty { font-size: 0.8rem; color: var(--text-muted); padding: var(--space-5); text-align: center; line-height: 1.6; }

        /* ===== Sin datos ===== */
        .sin-datos-card { padding: var(--space-6); text-align: center; color: var(--text-faint); margin-bottom: var(--space-5); }
        .sin-datos-card p { font-size: 0.85rem; margin-top: var(--space-2); line-height: 1.6; }

        /* ===== Placeholder de carga ===== */
        .loading-msg { padding: var(--space-5); color: var(--text-muted); font-size: 0.85rem; }
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 37%, var(--surface) 63%);
            background-size: 400% 100%; animation: shimmer 1.4s ease infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        /* ===== Modal ===== */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: var(--space-5); }
        .modal.open { display: flex; }
        .modal img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: var(--radius-sm); }
        .modal-close {
            position: absolute; top: var(--space-4); right: var(--space-5);
            font-size: 2rem; line-height: 1; cursor: pointer; color: #fff;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: background var(--trans);
        }
        .modal-close:hover { background: rgba(255,255,255,0.12); }

        /* ===== Botón de vista (Resumen / Detalle) ===== */
        .view-toggle {
            display: inline-flex; align-items: center; gap: var(--space-2);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-pill); padding: 5px var(--space-3);
            font-size: 0.78rem; font-weight: 600; color: var(--text-soft);
            cursor: pointer; transition: background var(--trans), border-color var(--trans), color var(--trans);
        }
        .view-toggle:hover { background: var(--surface-2); border-color: var(--accent); color: var(--text); }
        .view-toggle.active { background: var(--surface-3); border-color: var(--accent-2); color: var(--text); }

        /* ===== Vista de resumen / ranking ===== */
        .resumen-wrap { width: 100%; }
        .resumen-titulo { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: var(--space-1); letter-spacing: -0.2px; }
        .resumen-sub { font-size: 0.82rem; color: var(--text-muted); margin-bottom: var(--space-5); }
        .resumen-table-scroll { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
        table.resumen-table {
            width: 100%; border-collapse: collapse; font-size: 0.78rem;
            background: var(--surface); min-width: 760px;
        }
        table.resumen-table thead th {
            position: sticky; top: 0; z-index: 1;
            background: var(--surface-2); color: var(--text-soft);
            font-weight: 700; text-align: right; white-space: nowrap;
            padding: var(--space-3) var(--space-3);
            border-bottom: 1px solid var(--border);
            cursor: pointer; user-select: none;
            transition: background var(--trans), color var(--trans);
        }
        table.resumen-table thead th:first-child,
        table.resumen-table tbody td:first-child { text-align: left; }
        table.resumen-table thead th:nth-child(2),
        table.resumen-table tbody td:nth-child(2),
        table.resumen-table thead th.col-cal,
        table.resumen-table tbody td.col-cal { text-align: left; }
        table.resumen-table thead th:hover { background: var(--surface-3); color: var(--text); }
        table.resumen-table thead th .sort-ind { color: var(--accent); font-size: 0.7rem; margin-left: 4px; }
        table.resumen-table tbody td {
            padding: var(--space-2) var(--space-3); text-align: right; white-space: nowrap;
            border-bottom: 1px solid var(--border-soft); color: var(--text-soft);
        }
        table.resumen-table tbody tr { cursor: pointer; transition: background var(--trans); }
        table.resumen-table tbody tr:hover { background: var(--surface-2); }
        table.resumen-table tbody td.col-vol { font-weight: 600; color: var(--text); }
        table.resumen-table .cell-alert { color: var(--alert); font-weight: 700; }
        table.resumen-table .cell-warn { color: var(--warn); font-weight: 700; }
        table.resumen-table .cell-muted { color: var(--text-muted); }
        table.resumen-table .cell-empty { color: var(--text-faint); }

        /* ===== Responsive ===== */
        @media (max-width: 900px) {
            .main { flex-direction: column; height: auto; }
            .lista-panel { width: 100%; min-width: 100%; max-height: 42vh; }
            .detalle-panel { max-width: 100%; }
            .ifg-grid { grid-template-columns: 1fr; }
            .search-box input { width: 110px; }
        }
        @media (max-width: 560px) {
            .header { padding: var(--space-3) var(--space-4); }
            .detalle-panel { padding: var(--space-4); }
            .leyenda { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <h1>LiCSAR — Deformación InSAR</h1>
        <span class="badge badge-sar">Sentinel-1</span>
        <span class="badge badge-comet">COMET</span>
    </div>
    <div class="header-right">
        <label class="search-box">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/></svg>
            <input type="text" id="buscador" placeholder="Buscar volcán..." aria-label="Buscar volcán" autocomplete="off">
        </label>
        <button type="button" class="view-toggle" id="view-toggle" aria-pressed="false" title="Alternar entre vista de detalle y tabla de resumen de los 42 volcanes">
            <span id="view-toggle-label">Resumen</span>
        </button>
        <div class="header-meta" id="header-meta">Cargando...</div>
    </div>
</div>

<div class="info-bar">
    <span>Fuente: COMET LiCSAR + VolcanoDB (UK NERC)</span>
    <span class="sep">|</span>
    <span>Sensor: Sentinel-1 SAR (C-band 5.6 cm)</span>
    <span class="sep">|</span>
    <span>Prob. deformación: deep learning</span>
    <span class="sep">|</span>
    <span>Actualización: 2x/semana</span>
</div>

<div class="main">
    <div class="lista-panel" id="lista-panel">
        <div class="loading-msg">Cargando catálogo...</div>
    </div>
    <div class="detalle-panel" id="detalle-panel">
        <div class="detalle-placeholder">Selecciona un volcán para ver los interferogramas</div>
    </div>
</div>

<div class="modal" id="modal" onclick="cerrarModal()">
    <span class="modal-close">&times;</span>
    <img id="modal-img" src="" alt="">
</div>

<script>
function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined) e.textContent = text;
    return e;
}
function clearEl(e) { while (e.firstChild) e.removeChild(e.firstChild); }

const ZONAS = {
    'Norte': ['Taapaca','Parinacota','Guallatiri','Isluga','Irruputuncu','Ollague','San Pedro','Lascar'],
    'Centro': ['Tupungatito','San Jose','Tinguiririca','Planchon-Peteroa','Descabezado Grande','Tatara-San Pedro','Laguna del Maule','Nevado de Longavi','Nevados de Chillan'],
    'Sur': ['Antuco','Copahue','Callaqui','Lonquimay','Llaima','Sollipulli','Villarrica','Quetrupillan','Lanin','Mocho-Choshuenco','Carran - Los Venados','Puyehue - Cordon Caulle','Antillanca - Casablanca'],
    'Austral': ['Osorno','Calbuco','Yate','Hornopiren','Huequi','Michinmahuida','Chaiten','Corcovado','Melimoyu','Mentolat','Cay','Maca','Hudson']
};
const ZONA_POR_VOLCAN = {};
for (const [z, vs] of Object.entries(ZONAS)) vs.forEach(v => ZONA_POR_VOLCAN[v] = z);

let catalogGlobal = null;
let seleccionado = null;
let filtroTexto = '';
let vistaResumen = false;            // false = detalle por-volcán, true = tabla de ranking
let resumenSort = { key: 'vertical_cm_yr', dir: 'desc' };  // orden inicial: |vertical| desc

function getProb(v) { return v.comet?.prob_deformacion ?? null; }
function getProbMax(v) { return v.comet?.prob_max ?? null; }
function probClass(p) {
    if (p === null || p === undefined) return 'ok';
    if (p > 0.5) return 'alert';
    if (p > 0.2) return 'warn';
    return 'ok';
}
function estadoDot(v) {
    const p = getProb(v);
    if (p !== null && p > 0.5) return 'dot-alert';
    if (p !== null && p > 0.2) return 'dot-warn';
    if (v.comet?.interferogramas?.length || v.ascendente || v.descendente) return 'dot-ok';
    return 'dot-sin';
}
function tracksStr(v) {
    const partes = [];
    if (v.comet) partes.push(v.comet.total_interferogramas + ' ifgs COMET');
    if (v.ascendente) partes.push('ASC ' + v.ascendente.track);
    if (v.descendente) partes.push('DESC ' + v.descendente.track);
    return partes.length ? partes.join(' | ') : 'Sin datos';
}

function renderLista(volcanes) {
    const lista = document.getElementById('lista-panel');
    clearEl(lista);
    const q = filtroTexto.trim().toLowerCase();
    const porZona = {};
    let totalMostrados = 0;
    for (const [nombre, v] of Object.entries(volcanes)) {
        if (q && !nombre.toLowerCase().includes(q)) continue;
        const z = ZONA_POR_VOLCAN[nombre] || 'Otro';
        if (!porZona[z]) porZona[z] = [];
        porZona[z].push({ nombre, ...v });
        totalMostrados++;
    }
    if (totalMostrados === 0) {
        lista.appendChild(el('div', 'loading-msg', 'Sin volcanes que coincidan con "' + filtroTexto + '".'));
        return;
    }
    for (const zona of ['Norte','Centro','Sur','Austral']) {
        if (!porZona[zona]) continue;
        lista.appendChild(el('div', 'zona-hdr', zona));
        for (const v of porZona[zona]) {
            const row = document.createElement('div');
            row.className = 'volcan-row' + (seleccionado === v.nombre ? ' selected' : '');
            row.addEventListener('click', () => seleccionar(v.nombre));
            row.appendChild(el('div', 'estado-dot ' + estadoDot(v)));
            const info = document.createElement('div');
            info.style.cssText = 'flex:1;min-width:0;';
            info.appendChild(el('div', 'vname', v.nombre));
            info.appendChild(el('div', 'vtracks', tracksStr(v)));
            row.appendChild(info);
            const p = getProb(v);
            if (p !== null) {
                const cls = probClass(p);
                const badge = el('span', 'vprob vprob-' + cls,
                    p > 0.5 ? '⚠ Alto' : p > 0.2 ? 'Medio' : 'OK');
                badge.title = 'Score ML COMET (sin validar): ' + (p * 100).toFixed(0) + '%';
                row.appendChild(badge);
            }
            lista.appendChild(row);
        }
    }
}

function abrirModal(src) {
    document.getElementById('modal-img').src = src;
    document.getElementById('modal').classList.add('open');
}
function cerrarModal() { document.getElementById('modal').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

function crearCometSection(v, basePath) {
    const comet = v.comet;
    if (!comet || !comet.interferogramas?.length) return null;
    const section = document.createElement('div');
    section.className = 'comet-section';

    const hdr = document.createElement('div');
    hdr.className = 'comet-header';
    const hdrLeft = document.createElement('div');
    hdrLeft.className = 'comet-header-left';
    hdrLeft.appendChild(el('span', 'comet-title', 'Interferograma recortado'));
    hdrLeft.appendChild(el('span', 'comet-badge', 'COMET'));
    hdrLeft.appendChild(el('span', 'comet-stats',
        'Frame ' + comet.frame + ' | ' + comet.total_interferogramas + ' ifgs totales'));
    hdr.appendChild(hdrLeft);

    const selector = document.createElement('div');
    selector.className = 'comet-selector';
    selector.appendChild(el('label', null, 'Par de fechas:'));
    const select = document.createElement('select');
    const ifgs = comet.interferogramas;
    for (let i = ifgs.length - 1; i >= 0; i--) {
        const opt = document.createElement('option');
        opt.value = String(i);
        opt.textContent = ifgs[i].fecha || ifgs[i].par;
        select.appendChild(opt);
    }
    selector.appendChild(select);
    hdr.appendChild(selector);
    section.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'comet-body';
    const lastIdx = ifgs.length - 1;

    // Mapa de probabilidad de deformación (opcional). Emparejado por `par`,
    // no por índice, para robustez si las listas difieren en orden/longitud.
    const probmaps = (comet.probmaps && comet.probmaps.length) ? comet.probmaps : null;
    const probmapByPar = {};
    if (probmaps) probmaps.forEach(function(pm) { if (pm && pm.par) probmapByPar[pm.par] = pm; });

    // Contenedor en par (interferograma | mapa de probabilidad). Si no hay
    // probmaps, queda una sola columna y el comportamiento es el de siempre.
    const pair = document.createElement('div');
    pair.className = 'comet-pair';
    if (!probmaps) pair.style.gridTemplateColumns = '1fr';

    // --- Pane interferograma ---
    const ifgPane = document.createElement('div');
    ifgPane.className = 'comet-pane';
    const ifgPaneLabel = el('div', 'comet-pane-label', 'Interferograma (fase + coherencia)');
    ifgPane.appendChild(ifgPaneLabel);
    const img = document.createElement('img');
    img.src = basePath + '/' + ifgs[lastIdx].imagen + '?t=' + Date.now();
    img.alt = 'Interferograma COMET';
    img.addEventListener('click', function() { abrirModal(this.src); });
    img.onerror = function() {
        this.style.minHeight = '120px';
        this.style.background = '#1c2128';
        this.alt = 'Imagen no disponible';
    };
    ifgPane.appendChild(img);
    pair.appendChild(ifgPane);

    // --- Pane mapa de probabilidad (solo si hay probmaps) ---
    let probPane = null, probImg = null, probNote = null;
    if (probmaps) {
        probPane = document.createElement('div');
        probPane.className = 'comet-pane';
        const probPaneLabel = document.createElement('div');
        probPaneLabel.className = 'comet-pane-label';
        probPaneLabel.appendChild(document.createTextNode('Mapa de prob. de deformación'));
        probPaneLabel.appendChild(el('span', 'comet-ml-tag', 'ML COMET'));
        probPane.appendChild(probPaneLabel);
        probImg = document.createElement('img');
        probImg.alt = 'Mapa de probabilidad de deformación (COMET)';
        probImg.addEventListener('click', function() { if (this.src) abrirModal(this.src); });
        probImg.onerror = function() {
            this.style.minHeight = '120px';
            this.style.background = '#1c2128';
            this.alt = 'Mapa no disponible';
        };
        probPane.appendChild(probImg);
        probNote = el('div', 'comet-probmap-note',
            'Score ML por píxel (deep learning, COMET) — dónde el modelo cree que hay deformación. Sin validar.');
        probPane.appendChild(probNote);
        pair.appendChild(probPane);
    }

    body.appendChild(pair);
    const fechaLabel = el('div', 'comet-fecha',
        'Fase + coherencia | ' + (ifgs[lastIdx].fecha || ifgs[lastIdx].par));
    body.appendChild(fechaLabel);
    section.appendChild(body);

    // Actualiza la imagen del probmap buscando por `par`; oculta si no hay match.
    function actualizarProbmap(par) {
        if (!probImg) return;
        const pm = probmapByPar[par];
        if (pm && pm.imagen) {
            probImg.src = basePath + '/' + pm.imagen + '?t=' + Date.now();
            probPane.style.display = '';
        } else {
            probImg.removeAttribute('src');
            probPane.style.display = 'none';
            pair.style.gridTemplateColumns = '1fr';
        }
    }
    if (probmaps) actualizarProbmap(ifgs[lastIdx].par);

    select.addEventListener('change', function() {
        const idx = parseInt(this.value);
        img.src = basePath + '/' + ifgs[idx].imagen + '?t=' + Date.now();
        fechaLabel.textContent = 'Fase + coherencia | ' + (ifgs[idx].fecha || ifgs[idx].par);
        if (probmaps) {
            pair.style.gridTemplateColumns = '1fr 1fr';
            actualizarProbmap(ifgs[idx].par);
        }
    });
    return section;
}

function crearProbCard(v) {
    const p = getProb(v);
    if (p === null) return null;
    const pMax = getProbMax(v);
    const card = document.createElement('div');
    card.className = 'prob-card';
    const cls = probClass(p);
    var iconText = '\u2705';
    if (cls === 'alert') iconText = '\u26a0\ufe0f';
    else if (cls === 'warn') iconText = '\ud83d\udfe1';
    card.appendChild(el('div', 'prob-icon', iconText));
    const info = document.createElement('div');
    info.className = 'prob-info';
    info.appendChild(el('div', 'prob-label', 'Score ML de deformación (COMET, deep learning — no validado)'));
    var valText = (p * 100).toFixed(1) + '%';
    if (cls === 'alert') valText += ' — Score alto: requiere validación';
    else if (cls === 'warn') valText += ' — Score medio: revisar';
    else valText += ' — Score bajo';
    info.appendChild(el('div', 'prob-value prob-value-' + cls, valText));
    if (pMax !== null && pMax > p) {
        info.appendChild(el('div', 'prob-label', 'Máx reciente: ' + (pMax * 100).toFixed(1) + '%'));
    }
    info.appendChild(el('div', 'prob-label',
        'Probabilidad estimada por el modelo de COMET, sin calibración local. ' +
        'Confirmar siempre con la serie temporal y ambas geometrías (asc+desc) antes de alertar.'));
    card.appendChild(info);
    return card;
}

function crearIfgCard(titulo, subtitulo, prefijo, basePath) {
    const card = document.createElement('div');
    card.className = 'ifg-card';
    const hdr = document.createElement('div');
    hdr.className = 'ifg-header';
    hdr.appendChild(el('div', 'ifg-label', titulo));
    hdr.appendChild(el('div', 'ifg-sub', subtitulo));
    card.appendChild(hdr);
    const imgs = document.createElement('div');
    imgs.className = 'ifg-images';
    for (const [nombre, archivo] of [['Fase desenvuelta', 'unw'], ['Coherencia', 'coh']]) {
        const wrapper = document.createElement('div');
        wrapper.appendChild(el('div', 'img-mini-label', nombre));
        const img = document.createElement('img');
        img.src = basePath + '/' + prefijo + '_' + archivo + '.png?t=' + Date.now();
        img.alt = nombre;
        img.loading = 'lazy';
        img.addEventListener('click', function() { abrirModal(this.src); });
        img.onerror = function() {
            this.alt = 'No disponible';
            this.style.minHeight = '80px';
            this.style.background = '#1c2128';
        };
        wrapper.appendChild(img);
        imgs.appendChild(wrapper);
    }
    card.appendChild(imgs);
    return card;
}

async function renderTimeseries(volcanData, basePath, container) {
    // Robusto: intenta fetch directo. Si 404 o error, oculta la sección.
    // No depende del flag catalog.json que se pierde con sync de workflow.
    container.style.display = 'none';
    try {
        var resp = await fetch(basePath + '/timeseries.json?t=' + Date.now());
        if (!resp.ok) return;  // 404 -> sin serie, sección oculta
        var ts = await resp.json();
        if (!ts || !ts.dates || !ts.los_cm_filt) return;
        container.style.display = '';

        // Cumbre decorrelacionada: no hay píxeles coherentes en el cráter.
        // Mostrar aviso en vez de una línea plana en cero (que parecería "estable").
        if (ts.sin_datos || ts.calidad === 'sin_datos') {
            container.querySelector('#ts-plot').innerHTML =
                '<div class="ts-empty">Sin datos coherentes en la cumbre (decorrelación por ' +
                'nieve/vegetación permanente). No hay serie temporal medible en este frame.</div>';
            ['#ts-vert','#ts-vel','#ts-delta','#ts-n','#ts-px','#ts-lat','#ts-coh'].forEach(function(id){
                var e = container.querySelector(id); if (e) e.textContent = '—';
            });
            var cal0 = container.querySelector('#ts-cal');
            if (cal0) { cal0.textContent = 'Sin datos coherentes'; cal0.style.color = '#8b949e'; }
            return;
        }

        var velEl = container.querySelector('#ts-vel');
        var deltaEl = container.querySelector('#ts-delta');
        var nEl = container.querySelector('#ts-n');
        var pxEl = container.querySelector('#ts-px');
        var calEl = container.querySelector('#ts-cal');
        var latEl = container.querySelector('#ts-lat');
        var vertEl = container.querySelector('#ts-vert');
        // Velocidad vertical (asc+desc) — el número clave para inflación/deflación
        if (vertEl) {
            if (ts.descomposicion && ts.descomposicion.vertical_cm_yr != null) {
                var vv = ts.descomposicion.vertical_cm_yr;
                vertEl.textContent = (vv >= 0 ? '+' : '') + vv.toFixed(2) + ' cm/año';
                vertEl.style.color = Math.abs(vv) > 0.5 ? '#e3b341' : 'var(--text)';
                vertEl.title = vv >= 0 ? 'Inflación (suelo sube)' : 'Deflación (suelo baja)';
            } else {
                vertEl.textContent = 'una sola órbita';
                vertEl.style.color = 'var(--text-faint)';
                vertEl.title = 'Sin geometría opuesta para separar vertical de horizontal';
            }
        }
        // Velocidad con incertidumbre: "v ± SE cm/año"
        if (velEl) {
            if (ts.velocity_cm_yr != null) {
                var vtxt = (ts.velocity_cm_yr >= 0 ? '+' : '') + ts.velocity_cm_yr.toFixed(2);
                if (ts.velocity_se_cm_yr != null) vtxt += ' ± ' + ts.velocity_se_cm_yr.toFixed(2);
                velEl.textContent = vtxt;
            } else velEl.textContent = '—';
        }
        if (deltaEl) deltaEl.textContent = ts.delta_cm_180d != null ? ((ts.delta_cm_180d >= 0 ? '+' : '') + ts.delta_cm_180d.toFixed(2)) : '—';
        if (nEl) nEl.textContent = ts.n_fechas != null ? ts.n_fechas : (ts.dates ? ts.dates.length : '—');
        if (pxEl) pxEl.textContent = ts.roi && ts.roi.px_validos != null ? ts.roi.px_validos : '—';
        // Calidad / significancia
        if (calEl) {
            var calMap = {
                significativa: ['Tendencia significativa', '#3fb950'],
                no_significativa: ['Sin tendencia significativa', '#8b949e'],
                insuficiente: ['Datos insuficientes', '#d29922'],
                discontinua: ['Serie discontinua', '#d29922']
            };
            var cm = calMap[ts.calidad] || ['—', '#8b949e'];
            calEl.textContent = cm[0] + (ts.r2 != null ? ' (R²=' + ts.r2.toFixed(2) + ')' : '');
            calEl.style.color = cm[1];
        }
        // Latencia: ¿qué tan reciente es el último dato?
        if (latEl && ts.dias_latencia != null) {
            latEl.textContent = ts.dias_latencia + ' días';
            latEl.style.color = ts.dias_latencia > 60 ? '#d29922' : '#c9d1d9';
        }
        // Coherencia media del ROI: métrica de calidad (baja = serie poco confiable)
        var cohEl = container.querySelector('#ts-coh');
        if (cohEl) {
            var cohVal = ts.coherencia_roi;
            if (cohVal == null && ts.roi && ts.roi.coherencia != null) cohVal = ts.roi.coherencia;
            if (cohVal != null) {
                cohEl.textContent = cohVal.toFixed(2);
                cohEl.style.color = cohVal < 0.3 ? 'var(--alert)' : (cohVal < 0.5 ? 'var(--warn)' : 'var(--text)');
            } else {
                cohEl.textContent = '—';
                cohEl.style.color = 'var(--text)';
            }
        }

        var traces = [];
        traces.push({
            x: ts.dates, y: ts.los_cm_filt,
            type: 'scatter', mode: 'lines+markers',
            name: 'LOS filt', line: { color: '#58a6ff', width: 2 },
            marker: { size: 4, color: '#58a6ff' }
        });
        if (ts.los_cm_gacos) {
            traces.push({
                x: ts.dates, y: ts.los_cm_gacos,
                type: 'scatter', mode: 'lines',
                name: 'Con corrección GACOS',
                line: { color: '#f0883e', width: 1.5 },
                opacity: 0.7
            });
        }
        var probSerie = volcanData.comet && volcanData.comet.prob_serie;
        var hasProb = probSerie && probSerie.dates && probSerie.means;
        if (hasProb) {
            var ps = probSerie;
            traces.push({
                x: ps.dates, y: ps.means,
                type: 'scatter', mode: 'lines', fill: 'tozeroy',
                name: 'Probabilidad deformación',
                line: { color: '#f85149', width: 1 },
                fillcolor: 'rgba(248,81,73,0.25)',
                yaxis: 'y2'
            });
        }
        var layout = {
            paper_bgcolor: '#161b22', plot_bgcolor: '#0d1117',
            font: { color: '#c9d1d9', size: 11 },
            margin: { l: 55, r: hasProb ? 55 : 20, t: 10, b: 40 },
            hovermode: 'x unified',
            showlegend: true,
            legend: { orientation: 'h', y: -0.18, x: 0.5, xanchor: 'center', font: { size: 10 } },
            xaxis: { type: 'date', tickformat: '%Y-%m', gridcolor: '#21262d', zerolinecolor: '#30363d' },
            yaxis: { title: { text: 'Desplazamiento LOS (cm)', font: { size: 11 } }, gridcolor: '#21262d', zerolinecolor: '#30363d' }
        };
        if (hasProb) {
            layout.yaxis2 = { title: { text: 'Probabilidad', font: { size: 11 } }, overlaying: 'y', side: 'right', range: [0,1], showgrid: false };
        }
        var plotDiv = container.querySelector('#ts-plot');
        if (!window.Plotly) { plotDiv.innerHTML = '<div class="ts-empty">Gráfico no disponible (Plotly no cargó)</div>'; return; }
        Plotly.purge(plotDiv);  // evita acumular listeners al cambiar de volcán
        Plotly.newPlot(plotDiv, traces, layout, { responsive: true, displayModeBar: false });
    } catch (e) {
        // Silenciar: si hay error de fetch o parsing, simplemente no mostrar la sección
        container.style.display = 'none';
    }
}

    var section = document.createElement('section');

            '<span title="Velocidad robusta (Theil-Sen) ± error estándar (OLS), en línea de visión del satélite">Velocidad LOS: <b id="ts-vel">—</b> cm/año</span>' +

function renderDetalle(nombre) {
    const v = catalogGlobal.volcanes[nombre];
    const panel = document.getElementById('detalle-panel');
    clearEl(panel);

    panel.appendChild(el('div', 'detalle-titulo', nombre));
    var subParts = [];
    if (v.lat) subParts.push(v.lat.toFixed(3) + '\u00b0, ' + v.lon.toFixed(3) + '\u00b0');
    if (v.actualizado) subParts.push('Actualizado: ' + (v.actualizado || '').slice(0,10));
    panel.appendChild(el('div', 'detalle-sub', subParts.join(' | ')));

    const basePath = 'licsar/' + nombre.replace(/ /g,'_').replace(/-/g,'_');

    /* 1. Probabilidad */
    const probCard = crearProbCard(v);
    if (probCard) panel.appendChild(probCard);

    /* 1.5 Serie temporal LiCSBAS (antes de COMET) — siempre intenta, oculta si 404 */
    const tsSection = crearTimeseriesSection();
    panel.appendChild(tsSection);
    renderTimeseries(v, basePath, tsSection);

    /* 2. COMET recortado + selector */
    const cometSection = crearCometSection(v, basePath);
    if (cometSection) panel.appendChild(cometSection);

    /* 3. Frames LiCSAR colapsable */
    const tieneAsc = v.ascendente?.unw_disponible || v.ascendente?.coh_disponible;
    const tieneDesc = v.descendente?.unw_disponible || v.descendente?.coh_disponible;
    if (tieneAsc || tieneDesc) {
        const framesSection = document.createElement('div');
        framesSection.className = 'frames-section';
        var isOpen = false;
        const toggle = el('div', 'frames-toggle', '\u25b6 Frames LiCSAR completos (ASC/DESC)');
        const content = document.createElement('div');
        content.className = 'frames-content';
        toggle.addEventListener('click', function() {
            isOpen = !isOpen;
            content.className = isOpen ? 'frames-content open' : 'frames-content';
            toggle.textContent = (isOpen ? '\u25bc' : '\u25b6') + ' Frames LiCSAR completos (ASC/DESC)';
        });
        framesSection.appendChild(toggle);
        const grid = document.createElement('div');
        grid.className = 'ifg-grid';
        if (tieneAsc) {
            var info = v.ascendente;
            grid.appendChild(crearIfgCard('Ascendente (ASC)',
                'Track ' + info.track + ' | ' + (info.par_fechas||'').replace('_',' \u2192 '),
                'asc', basePath));
        }
        if (tieneDesc) {
            var info2 = v.descendente;
            grid.appendChild(crearIfgCard('Descendente (DESC)',
                'Track ' + info2.track + ' | ' + (info2.par_fechas||'').replace('_',' \u2192 '),
                'desc', basePath));
        }
        content.appendChild(grid);
        framesSection.appendChild(content);
        panel.appendChild(framesSection);
    }

    /* 4. Sin datos */
    if (!cometSection && !tieneAsc && !tieneDesc) {
        const sin = document.createElement('div');
        sin.className = 'sin-datos-card';
        sin.appendChild(el('p', null, 'Sin interferogramas disponibles para este volcán.'));
        panel.appendChild(sin);
    }

    /* 5. Guía InSAR */
    const infoDiv = document.createElement('div');
    infoDiv.className = 'info-insar';
    infoDiv.appendChild(el('h3', null, 'Cómo interpretar'));
    var textos = [
        'Fase desenvuelta (unw): cada franja de color \u2248 2.8 cm de deformación LOS. Fringes concéntricos = inflación o deflación.',
        'Coherencia (coh): Blanco = señal confiable. Negro = decorrelación (vegetación, nieve).',
        'Probabilidad > 50% = deformación detectada por deep learning (modelo COMET).'
    ];
    textos.forEach(function(t) { infoDiv.appendChild(el('p', null, t)); });
    var leyDiv = document.createElement('div');
    leyDiv.className = 'leyenda';
    var leyItems = [
        ['linear-gradient(to right,#2196F3,#00BCD4,#4CAF50,#FFEB3B,#FF5722)', 'Ciclo de fase'],
        ['linear-gradient(to right,#000,#fff)', 'Coherencia 0\u21921'],
        ['#3fb950', 'Sin deformación (<20%)'],
        ['#f85149', 'Deformación detectada (>50%)'],
    ];
    leyItems.forEach(function(pair) {
        var item = document.createElement('div');
        item.className = 'ley-item';
        var sw = document.createElement('div');
        sw.className = 'ley-swatch';
        sw.style.background = pair[0];
        item.appendChild(sw);
        item.appendChild(document.createTextNode(pair[1]));
        leyDiv.appendChild(item);
    });
    infoDiv.appendChild(leyDiv);
    panel.appendChild(infoDiv);
}

/* ===== Vista de resumen / ranking (tabla de los 42) ===== */
// Columnas: key = campo de comet.resumen (o derivado); abs = ordenar por valor absoluto.
var RESUMEN_COLS = [
    { key: 'nombre',          label: 'Volcán',           type: 'text' },
    { key: 'zona',            label: 'Zona',             type: 'text' },
    { key: 'vertical_cm_yr',  label: 'Vertical (cm/año)', type: 'num', abs: true },
    { key: 'velocity_cm_yr',  label: 'Vel LOS',          type: 'num' },
    { key: 'calidad',         label: 'Calidad',          type: 'text' },
    { key: 'coherencia',      label: 'Coherencia',       type: 'num' },
    { key: 'dias_latencia',   label: 'Latencia (días)',  type: 'num' },
    { key: 'n_fechas',        label: 'Nº fechas',        type: 'num' }
];

// Aplana el catálogo a filas con los campos del resumen; tolera resumen ausente.
function filasResumen(volcanes) {
    var filas = [];
    for (var nombre in volcanes) {
        if (!Object.prototype.hasOwnProperty.call(volcanes, nombre)) continue;
        var v = volcanes[nombre];
        var r = (v.comet && v.comet.resumen) ? v.comet.resumen : null;
        filas.push({
            nombre: nombre,
            zona: ZONA_POR_VOLCAN[nombre] || 'Otro',
            tieneResumen: !!r,
            velocity_cm_yr: r && r.velocity_cm_yr != null ? r.velocity_cm_yr : null,
            vertical_cm_yr: r && r.vertical_cm_yr != null ? r.vertical_cm_yr : null,
            calidad: r && r.calidad != null ? r.calidad : null,
            coherencia: r && r.coherencia != null ? r.coherencia : null,
            dias_latencia: r && r.dias_latencia != null ? r.dias_latencia : null,
            n_fechas: r && r.n_fechas != null ? r.n_fechas : null
        });
    }
    return filas;
}

function ordenarFilas(filas) {
    var col = null;
    for (var i = 0; i < RESUMEN_COLS.length; i++) if (RESUMEN_COLS[i].key === resumenSort.key) col = RESUMEN_COLS[i];
    if (!col) col = RESUMEN_COLS[2];
    var dir = resumenSort.dir === 'asc' ? 1 : -1;
    var useAbs = !!col.abs;
    return filas.slice().sort(function(a, b) {
        // Volcanes sin resumen siempre al final, sin importar dirección.
        if (a.tieneResumen !== b.tieneResumen) return a.tieneResumen ? -1 : 1;
        var av = a[col.key], bv = b[col.key];
        if (col.type === 'text') {
            av = (av == null ? '' : String(av)).toLowerCase();
            bv = (bv == null ? '' : String(bv)).toLowerCase();
            if (av < bv) return -1 * dir;
            if (av > bv) return 1 * dir;
            return a.nombre < b.nombre ? -1 : 1;
        }
        // Numérico: nulos al final siempre.
        var an = (av == null), bn = (bv == null);
        if (an && bn) return a.nombre < b.nombre ? -1 : 1;
        if (an) return 1;
        if (bn) return -1;
        var ax = useAbs ? Math.abs(av) : av;
        var bx = useAbs ? Math.abs(bv) : bv;
        if (ax < bx) return -1 * dir;
        if (ax > bx) return 1 * dir;
        return a.nombre < b.nombre ? -1 : 1;
    });
}

function fmtNum(x, dec) { return x == null ? '—' : (x.toFixed(dec)); }
function fmtSigned(x, dec) { return x == null ? '—' : ((x >= 0 ? '+' : '') + x.toFixed(dec)); }

var CALIDAD_LABEL = {
    significativa: 'Tendencia significativa',
    no_significativa: 'Sin tendencia signif.',
    insuficiente: 'Datos insuficientes',
    discontinua: 'Serie discontinua',
    sin_datos: 'Sin datos'
};

function renderResumen() {
    var panel = document.getElementById('detalle-panel');
    clearEl(panel);
    if (!catalogGlobal || !catalogGlobal.volcanes) {
        panel.appendChild(el('div', 'detalle-placeholder', 'Catálogo no disponible.'));
        return;
    }
    var wrap = document.createElement('div');
    wrap.className = 'resumen-wrap';
    wrap.appendChild(el('div', 'resumen-titulo', 'Resumen de monitoreo'));
    wrap.appendChild(el('div', 'resumen-sub',
        'Ranking de los volcanes por actividad. Ordenado por |velocidad vertical| descendente. ' +
        'Clic en una columna para reordenar; clic en una fila para abrir el detalle. ' +
        'Volcanes sin resumen al final.'));

    var filas = ordenarFilas(filasResumen(catalogGlobal.volcanes));

    var scroll = document.createElement('div');
    scroll.className = 'resumen-table-scroll';
    var table = document.createElement('table');
    table.className = 'resumen-table';

    // --- thead ---
    var thead = document.createElement('thead');
    var trh = document.createElement('tr');
    RESUMEN_COLS.forEach(function(col) {
        var th = document.createElement('th');
        if (col.key === 'calidad') th.className = 'col-cal';
        th.appendChild(document.createTextNode(col.label));
        if (resumenSort.key === col.key) {
            th.appendChild(el('span', 'sort-ind', resumenSort.dir === 'asc' ? '▲' : '▼'));
        }
        th.addEventListener('click', function() {
            if (resumenSort.key === col.key) {
                resumenSort.dir = (resumenSort.dir === 'asc') ? 'desc' : 'asc';
            } else {
                resumenSort.key = col.key;
                resumenSort.dir = (col.type === 'text') ? 'asc' : 'desc';
            }
            renderResumen();
        });
        trh.appendChild(th);
    });
    thead.appendChild(trh);
    table.appendChild(thead);

    // --- tbody ---
    var tbody = document.createElement('tbody');
    filas.forEach(function(f) {
        var tr = document.createElement('tr');
        tr.addEventListener('click', function() { seleccionar(f.nombre); });

        // Volcán
        var tdVol = document.createElement('td');
        tdVol.className = 'col-vol';
        tdVol.appendChild(document.createTextNode(f.nombre));
        tr.appendChild(tdVol);

        // Zona
        tr.appendChild(el('td', null, f.zona));

        // Vertical (cm/año) — coloreado por magnitud
        var tdVert = document.createElement('td');
        if (f.vertical_cm_yr == null) {
            tdVert.className = 'cell-empty';
            tdVert.textContent = '—';
        } else {
            var av = Math.abs(f.vertical_cm_yr);
            if (av > 0.5) tdVert.className = 'cell-alert';
            else if (av > 0.2) tdVert.className = 'cell-warn';
            tdVert.textContent = fmtSigned(f.vertical_cm_yr, 2);
        }
        tr.appendChild(tdVert);

        // Vel LOS
        var tdVel = document.createElement('td');
        if (f.velocity_cm_yr == null) { tdVel.className = 'cell-empty'; tdVel.textContent = '—'; }
        else tdVel.textContent = fmtSigned(f.velocity_cm_yr, 2);
        tr.appendChild(tdVel);

        // Calidad
        var tdCal = document.createElement('td');
        tdCal.className = 'col-cal';
        if (f.calidad == null) { tdCal.className += ' cell-empty'; tdCal.textContent = '—'; }
        else {
            tdCal.textContent = CALIDAD_LABEL[f.calidad] || f.calidad;
            if (f.calidad === 'sin_datos' || f.calidad === 'insuficiente' || f.calidad === 'discontinua') {
                tdCal.className += ' cell-warn';
            } else if (f.calidad === 'no_significativa') {
                tdCal.className += ' cell-muted';
            }
        }
        tr.appendChild(tdCal);

        // Coherencia — <0.3 en alerta
        var tdCoh = document.createElement('td');
        if (f.coherencia == null) { tdCoh.className = 'cell-empty'; tdCoh.textContent = '—'; }
        else {
            if (f.coherencia < 0.3) tdCoh.className = 'cell-alert';
            else if (f.coherencia < 0.5) tdCoh.className = 'cell-warn';
            tdCoh.textContent = fmtNum(f.coherencia, 2);
        }
        tr.appendChild(tdCoh);

        // Latencia (días)
        var tdLat = document.createElement('td');
        if (f.dias_latencia == null) { tdLat.className = 'cell-empty'; tdLat.textContent = '—'; }
        else {
            if (f.dias_latencia > 60) tdLat.className = 'cell-warn';
            tdLat.textContent = String(f.dias_latencia);
        }
        tr.appendChild(tdLat);

        // Nº fechas
        var tdN = document.createElement('td');
        if (f.n_fechas == null) { tdN.className = 'cell-empty'; tdN.textContent = '—'; }
        else tdN.textContent = String(f.n_fechas);
        tr.appendChild(tdN);

        tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    scroll.appendChild(table);
    wrap.appendChild(scroll);
    panel.appendChild(wrap);
}

function aplicarVistaToggleUI() {
    var btn = document.getElementById('view-toggle');
    var lbl = document.getElementById('view-toggle-label');
    if (!btn || !lbl) return;
    btn.classList.toggle('active', vistaResumen);
    btn.setAttribute('aria-pressed', vistaResumen ? 'true' : 'false');
    lbl.textContent = vistaResumen ? 'Ver detalle' : 'Resumen';
}

function mostrarResumen() {
    vistaResumen = true;
    aplicarVistaToggleUI();
    renderResumen();
}

function mostrarDetalle() {
    vistaResumen = false;
    aplicarVistaToggleUI();
    var panel = document.getElementById('detalle-panel');
    if (seleccionado && catalogGlobal && catalogGlobal.volcanes[seleccionado]) {
        renderDetalle(seleccionado);
    } else {
        clearEl(panel);
        panel.appendChild(el('div', 'detalle-placeholder', 'Selecciona un volcán para ver los interferogramas'));
    }
}

function seleccionar(nombre) {
    seleccionado = nombre;
    vistaResumen = false;            // un clic en volcán siempre vuelve al detalle
    aplicarVistaToggleUI();
    renderLista(catalogGlobal.volcanes);
    renderDetalle(nombre);
}

async function cargar() {
    try {
        var resp = await fetch('licsar/catalog.json?t=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        catalogGlobal = await resp.json();
        var n = Object.keys(catalogGlobal.volcanes).length;
        var conComet = Object.values(catalogGlobal.volcanes)
            .filter(function(v) { return v.comet?.interferogramas?.length; }).length;
        var conDatos = Object.values(catalogGlobal.volcanes)
            .filter(function(v) { return v.comet || v.ascendente || v.descendente; }).length;
        document.getElementById('header-meta').textContent =
            (catalogGlobal.actualizado||'').slice(0,10) + ' | ' + conDatos + '/' + n + ' volcanes | ' + conComet + ' con COMET';
        renderLista(catalogGlobal.volcanes);
    } catch (e) {
        document.getElementById('lista-panel').textContent =
            'Sin catálogo. Ejecuta: python frame_finder.py && python licsar_downloader.py && python comet_downloader.py';
        document.getElementById('header-meta').textContent = 'Sin datos';
    }
}

// Filtrado en tiempo real por nombre (UX, no altera datos)
(function () {
    var buscador = document.getElementById('buscador');
    if (buscador) {
        buscador.addEventListener('input', function () {
            filtroTexto = this.value;
            if (catalogGlobal && catalogGlobal.volcanes) renderLista(catalogGlobal.volcanes);
        });
    }
    var viewToggle = document.getElementById('view-toggle');
    if (viewToggle) {
        viewToggle.addEventListener('click', function () {
            if (vistaResumen) mostrarDetalle(); else mostrarResumen();
        });
    }
})();

cargar();
</script>
