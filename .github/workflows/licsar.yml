name: LiCSAR — Deformación InSAR

on:
  schedule:
    # Dos veces al día: 07:00 y 19:00 UTC (~04:00 y 16:00 Chile)
    - cron: '0 7,19 * * *'
  workflow_dispatch:
    inputs:
      solo_descubrimiento:
        description: 'Solo correr frame_finder (sin descargar)'
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write

# Evita que dos corridas se solapen y pisen el commit de la otra (causa raíz de
# la pérdida previa de flags timeseries). La nueva espera a que termine la anterior.
concurrency:
  group: licsar-sync
  cancel-in-progress: false

jobs:
  licsar-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # Frame finder: solo lunes (frames no cambian frecuente)
      - name: Descubrir frames (frame_finder.py)
        run: |
          DOW=$(date +%u)  # 1=lunes
          if [ "$DOW" = "1" ] || [ ! -f "datos/frames_volcanes.json" ] || [ "${{ github.event.inputs.solo_descubrimiento }}" = "true" ]; then
            echo "Ejecutando frame_finder.py (lunes o primera vez)..."
            python frame_finder.py || echo "frame_finder completado con advertencias"
          else
            echo "No es lunes y catálogo existe. Saltando frame_finder."
          fi
        continue-on-error: true

      # LiCSAR downloader: solo lunes y jueves (PNGs de frame completo)
      - name: Descargar PNGs LiCSAR
        if: ${{ github.event.inputs.solo_descubrimiento != 'true' }}
        run: |
          DOW=$(date +%u)
          if [ "$DOW" = "1" ] || [ "$DOW" = "4" ]; then
            if [ -f "datos/frames_volcanes.json" ]; then
              echo "Descargando PNGs LiCSAR (lun/jue)..."
              python licsar_downloader.py
            else
              echo "No hay catálogo de frames."
            fi
          else
            echo "No es lun/jue. Saltando LiCSAR PNGs."
          fi
        continue-on-error: true

      # COMET downloader: diario (interferogramas recortados + probabilidad)
      - name: Descargar interferogramas COMET
        if: ${{ github.event.inputs.solo_descubrimiento != 'true' }}
        run: |
          echo "Descargando datos COMET..."
          python comet_downloader.py
        continue-on-error: true

      # Timeseries downloader: solo lunes (descarga JSONs grandes ~22MB c/u)
      - name: Descargar series temporales LiCSBAS
        if: ${{ github.event.inputs.solo_descubrimiento != 'true' }}
        run: |
          DOW=$(date +%u)
          if [ "$DOW" = "1" ]; then
            echo "Descargando series temporales LiCSBAS (lunes)..."
            python timeseries_downloader.py
          else
            echo "No es lunes. Saltando timeseries downloader."
          fi
        continue-on-error: true

      - name: Resumen de espacio
        run: |
          echo "=== Espacio en docs/licsar/ ==="
          du -sh docs/licsar/ 2>/dev/null || echo "Sin datos aún"
          echo "=== Archivos ==="
          find docs/licsar/ -name "*.png" 2>/dev/null | wc -l | xargs echo "PNGs:"
          find docs/licsar/ -name "*.jpg" 2>/dev/null | wc -l | xargs echo "JPGs COMET:"

      # Chequeo de salud: falla ruidosamente si el catálogo quedó corrupto o vacío.
      # Antes los fallos quedaban ocultos por continue-on-error y se commiteaba basura.
      - name: Verificar salud del catálogo
        run: |
          python -c "
          import json, sys
          try:
              c = json.load(open('docs/licsar/catalog.json'))
          except Exception as e:
              print(f'::error::catalog.json ilegible: {e}'); sys.exit(1)
          vs = c.get('volcanes', {})
          con_datos = sum(1 for v in vs.values() if v.get('comet', {}).get('interferogramas'))
          print(f'Volcanes totales: {len(vs)} | con datos COMET: {con_datos}')
          if con_datos == 0:
              print('::error::Ningún volcán tiene datos COMET — descarga falló'); sys.exit(1)
          "

      - name: Commit resultados
        run: |
          git config user.name "LiCSARBot"
          git config user.email "licsar@insar.com"
          git add datos/ docs/licsar/ 2>/dev/null || true
          if git diff --quiet --staged 2>/dev/null; then
            echo "Sin cambios nuevos"
          else
            RESUMEN=$(python -c "
          import json
          try:
              c = json.load(open('docs/licsar/catalog.json'))
              vs = c.get('volcanes',{})
              comet = sum(1 for v in vs.values() if v.get('comet',{}).get('interferogramas'))
              total = len(vs)
              print(f'{comet}/{total} volcanes COMET')
          except: print('updated')
          " 2>/dev/null || echo "updated")
            git commit -m "auto: $RESUMEN — $(date +'%Y-%m-%d %H:%M UTC')"
            # Push con reintentos: rebase preservando NUESTROS cambios y push hasta 3 veces.
            # -X theirs en rebase = preferir la rama que se reaplica (la nuestra, el commit local).
            ok=0
            for i in 1 2 3; do
              git pull origin main --rebase -X theirs || true
              if git push origin main; then ok=1; break; fi
              echo "Push falló (intento $i), reintentando en 5s..."
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "::error::No se pudo pushear tras 3 intentos"
              exit 1
            fi
          fi

      # Notificación: si algo crítico falló, abre un Issue para enterarse.
      - name: Notificar fallo
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const titulo = `Fallo en sincronización LiCSAR — ${new Date().toISOString().slice(0,10)}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: titulo,
              body: `La corrida automática falló.\n\nVer logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['automated', 'pipeline-failure']
            });
